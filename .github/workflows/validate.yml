name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  stdlib:
    name: validate standard library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install reference implementation
        # The documented surface (erf/norm_ppf/ts_*, etc.) shipped in trail-lang 0.13; validate the
        # stdlib against the released reference impl rather than tracking main.
        run: pip install "trail-lang>=0.13"
      - name: Validate stdlib against the reference implementation
        run: python scripts/validate_stdlib.py
